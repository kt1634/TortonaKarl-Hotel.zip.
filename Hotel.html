let hotelLog = []

function updateHotelLog(){

let display = ""

for(let i=0;i<hotelLog.length;i++){
display += (i+1) + ". " + hotelLog[i]+"<br>"
}

document.getElementById("log").innerHTML = display

}


//first
let items1=[]

function add1(){
if(items1.length >= 4) {
        button.disabled = true
        document.getElementById('placeholder').innerHTML = "Room cannot be unlocked."
        document.getElementById('placeholder3').innerHTML = "Room cannot be unlocked due to being full."
}
let name = document.getElementById("list").value

if(!name)return

let time = new Date().toLocaleTimeString()

items1.push(name +" ("+time+")")

hotelLog.push(name +" checked into Suite 1 at "+time)

updateDisplay("placeholder", items1)

updateHotelLog()

document.getElementById("list").value = ""

}

function remove1(){

let name = document.getElementById("rem").value
if(!name) return

for(let i=0;i<items1.length;i++){
if(items1[i].startsWith(name)){
items1.splice(i,1)
break
}
}

updateDisplay("placeholder", items1)

document.getElementById("rem").value = ""


}

function lock1(){
document.getElementById("list").disabled = true
}

function unlock1(){
    if(items1.length >= 5) {
        button.disabled = true
        document.getElementById('placeholder3').innerHTML = "Room is unlocked."
        document.getElementById('placeholder3').innerHTML = "Room cannot be unlocked due to being full."

document.getElementById("list").disabled = false
}

items1=[]
